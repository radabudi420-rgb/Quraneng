<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004d40;
            --secondary: #00695c;
            --bg: #f8fafc;
            --accent: #f4bb44;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1e293b; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-link { color: white; text-decoration: none; font-size: 24px; width: 50px; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .title { text-align: center; font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
        
        .verse-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .verse-num { font-weight: 700; color: var(--primary); font-size: 14px; margin-bottom: 10px; }
        .ar-text { font-family: 'Amiri', serif; font-size: 26px; text-align: right; direction: rtl; color: #000; line-height: 2.2; margin-bottom: 10px; }
        .en-text { font-size: 14px; color: #475569; font-style: italic; border-left: 3px solid var(--accent); padding-left: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-link">←</a>
    <div style="font-weight: 600;" id="headerTitle">Reading Mode</div>
    <div style="width: 50px;"></div>
</header>

<div class="container">
    <div class="title" id="surahTitle">Loading...</div>
    <div id="versesContainer"></div>
</div>

<script>
    async function loadData() {
        try {
            // Memuat file JSON
            const qRes = await fetch('quran.json');
            const qData = await qRes.json();

            const sRes = await fetch('en.sahih.json');
            const sData = await sRes.json();

            renderPage(qData, sData);
        } catch (error) {
            console.error("Gagal memuat data JSON:", error);
            document.getElementById('surahTitle').innerText = "Error Loading Data";
            document.getElementById('versesContainer').innerHTML = `<p style="text-align:center;">Pastikan file quran.json dan en.sahih.json berada di folder yang sama.</p>`;
        }
    }

    function renderPage(quranData, sahihData) {
        const urlParams = new URLSearchParams(window.location.search);
        const surahId = parseInt(urlParams.get('id')) || 1;

        // Cari Surah di quran.json
        const currentSurah = quranData.find(s => s.id === surahId);
        if (!currentSurah) {
            document.getElementById('surahTitle').innerText = "Surah tidak ditemukan";
            return;
        }

        document.getElementById('surahTitle').innerText = `${currentSurah.name} - ${currentSurah.transliteration}`;
        document.getElementById('headerTitle').innerText = currentSurah.name;

        // Cari Surah di en.sahih.json
        let sahihSurah = null;
        if (sahihData && sahihData.data && sahihData.data.surahs) {
            sahihSurah = sahihData.data.surahs.find(s => s.number === surahId);
        }

        const container = document.getElementById('versesContainer');
        container.innerHTML = "";

        // Tampilkan setiap ayat
        currentSurah.verses.forEach((verse, index) => {
            let transText = "Terjemahan belum tersedia.";
            if (sahihSurah && sahihSurah.ayahs && sahihSurah.ayahs[index]) {
                transText = sahihSurah.ayahs[index].text;
            }

            const card = document.createElement('div');
            card.className = 'verse-card';
            card.innerHTML = `
                <div class="verse-num">Ayat ${verse.id}</div>
                <div class="ar-text">${verse.text}</div>
                <div class="en-text">${transText}</div>
            `;
            container.appendChild(card);
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
